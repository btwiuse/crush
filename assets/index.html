<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>crush.wasm</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #1e1e1e;
        overflow: hidden;
      }

      #terminal-container {
        width: 100%;
        height: 100%;
        /* xterm.js fills this element */
      }

      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1e1e1e;
        color: #ccc;
        font-family: monospace;
        font-size: 1rem;
        z-index: 10;
        transition: opacity 0.3s;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <!-- xterm.js from CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6/css/xterm.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.1.0-beta.216/lib/xterm.js"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.12.0-beta.216/lib/addon-fit.js"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@xterm/addon-image@0.10.0-beta.216/lib/addon-image.js"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.20.0-beta.215/lib/addon-webgl.js"
    ></script>

    <script src="wasm_exec.js"></script>
  </head>
  <body>
    <div id="loading">Loading crush.wasm…</div>
    <div id="terminal-container"></div>

    <script type="module" src="main.js"></script>
  </body>
</html>
